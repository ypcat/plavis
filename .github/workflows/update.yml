name: Daily PLA activity update

on:
  schedule:
    # 22:15 UTC ≈ 06:15 Taipei, shortly after MND publishes the daily bulletin.
    - cron: "15 22 * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Crawl every page (full backfill)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: update-pla-activity
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
          python-version: "3.11"

      - name: Install Python deps
        run: uv pip install --system -r requirements.txt

      - name: Run update
        run: |
          args="--verbose"
          if [ "${{ inputs.full }}" = "true" ]; then args="$args --full"; fi
          python update.py $args 2>&1 | tee update.log

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-debug-${{ github.run_id }}
          path: |
            debug/
            update.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pla_activity.csv index.html
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: update $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push rejected on attempt $i; rebasing onto origin/main"
            git fetch origin main
            git rebase origin/main || {
              echo "::error::rebase failed; aborting"
              git rebase --abort || true
              exit 1
            }
            sleep $((2 ** i))
          done
          echo "::error::could not push after 5 attempts"
          exit 1
